<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />
    <title>Study-G - Mühendislik Öğrencileri İçin Akıllı Çalışma Asistanı</title>
    <meta name="description" content="Mühendislik öğrencileri için akıllı çalışma asistanı. Ders notlarını yönet, çalışma süreni takip et ve sınavlara hazırlan." />
    <meta name="theme-color" content="#D4AF37" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #0A0A0A;
      }
      #root {
        display: flex;
        height: 100%;
        width: 100%;
      }
      /* Loading screen */
      .loading {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #0A0A0A;
        color: #D4AF37;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
      }
      .loading h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        font-weight: bold;
      }
      .loading p {
        color: #666;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #333;
        border-top-color: #D4AF37;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 1rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>JavaScript'i etkinleştirmeniz gerekmektedir.</noscript>
    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
        <h1>Study-G</h1>
        <p>Yükleniyor...</p>
      </div>
    </div>
  </body>
</html>
